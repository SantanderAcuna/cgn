<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Normativa Jurídica Colombiana</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C8A85A;
  --gold-light: #E8C97A;
  --gold-dim: rgba(200,168,90,0.15);
  --ink: #0D1117;
  --ink-soft: #1C2333;
  --surface: #131920;
  --surface2: #1A2332;
  --surface3: #222E42;
  --text: #E8EDF5;
  --text-muted: #8A9BB5;
  --accent-blue: #4A9EFF;
  --accent-green: #3DD68C;
  --accent-red: #FF6B6B;
  --accent-purple: #B06EF3;
  --border: rgba(200,168,90,0.2);
  --radius: 13px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--text);min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{background:var(--ink);border-bottom:1px solid rgba(200,168,90,0.12);padding:0 24px;height:58px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:200;flex-shrink:0;}
.logo-badge{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 0 0 1px rgba(200,168,90,0.3),0 4px 16px rgba(200,168,90,0.25);flex-shrink:0;}
.topbar-text h1{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--gold);line-height:1.2;}
.topbar-text p{font-size:0.7rem;color:var(--text-muted);margin-top:1px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.topbar-badge{background:rgba(200,168,90,0.1);border:1px solid rgba(200,168,90,0.25);color:var(--gold);font-size:0.68rem;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:0.05em;white-space:nowrap;}
.menu-toggle{display:none;background:var(--surface2);border:1px solid rgba(255,255,255,0.08);color:var(--text);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:18px;align-items:center;justify-content:center;}

/* SHELL */
.app-shell{display:flex;flex:1;min-height:calc(100vh - 58px);}

/* SIDEBAR */
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid rgba(255,255,255,0.05);position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent;padding:12px 10px 32px;display:flex;flex-direction:column;gap:2px;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}

.sidebar-search{position:relative;margin-bottom:6px;}
.sidebar-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;}
#search{width:100%;background:var(--surface2);border:1px solid rgba(255,255,255,0.06);border-radius:9px;padding:8px 10px 8px 32px;font-family:'DM Sans',sans-serif;font-size:0.78rem;color:var(--text);outline:none;transition:border-color 0.2s;}
#search::placeholder{color:var(--text-muted);}
#search:focus{border-color:var(--border);}

.nav-group-label{font-size:0.58rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted);padding:14px 8px 6px;display:flex;align-items:center;gap:6px;opacity:0.5;}
.nav-group-label:first-of-type{padding-top:4px;}
.nav-group-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.07);}

.filter-btn{width:100%;background:none;border:none;cursor:pointer;padding:0;font-family:'DM Sans',sans-serif;border-radius:9px;text-align:left;position:relative;display:block;}
.filter-btn-inner{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border-radius:9px;transition:background 0.18s;}
.filter-btn .t-icon{width:32px;height:32px;border-radius:7px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:background 0.2s,transform 0.2s;}
.filter-btn .t-label{font-size:0.8rem;font-weight:500;color:var(--text-muted);line-height:1.3;transition:color 0.18s;flex:1;}
.filter-btn .t-count{font-size:0.68rem;background:var(--surface3);color:var(--text-muted);border-radius:10px;padding:1px 7px;font-weight:600;}
.filter-btn:hover .filter-btn-inner{background:var(--surface2);}
.filter-btn:hover .t-label{color:var(--text);}
.filter-btn:hover .t-icon{transform:scale(1.07);}
.filter-btn.active .filter-btn-inner{background:rgba(200,168,90,0.1);}
.filter-btn.active .t-icon{background:linear-gradient(135deg,rgba(200,168,90,0.28),rgba(200,168,90,0.12));box-shadow:0 0 0 1px rgba(200,168,90,0.25);}
.filter-btn.active .t-label{color:var(--gold);font-weight:600;}
.filter-btn.active .t-count{background:rgba(200,168,90,0.15);color:var(--gold);}
.filter-btn.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:var(--gold);border-radius:0 2px 2px 0;}

/* MAIN */
.main{flex:1;padding:28px 32px;min-width:0;}

.results-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.results-bar h2{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;color:var(--text);}
.count-pill{background:var(--gold-dim);color:var(--gold);font-size:0.72rem;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid rgba(200,168,90,0.25);}

/* CARD GRID */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}

/* CARD */
.card{background:var(--surface);border:1px solid rgba(255,255,255,0.05);border-radius:var(--radius);padding:20px;cursor:pointer;transition:border-color 0.2s,transform 0.2s,background 0.2s;position:relative;overflow:hidden;animation:fadeIn 0.4s ease both;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--card-accent,var(--gold));opacity:0;transition:opacity 0.2s;}
.card:hover{border-color:var(--border);background:var(--surface2);transform:translateY(-2px);}
.card:hover::before{opacity:1;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.card-icon{width:40px;height:40px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid rgba(255,255,255,0.06);flex-shrink:0;}
.card-type-badge{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:3px 9px;border-radius:20px;background:var(--gold-dim);color:var(--gold);border:1px solid rgba(200,168,90,0.25);}
.card-num{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.2;}
.card-year{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--text-muted);margin-bottom:10px;}
.card-title{font-size:0.85rem;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:8px;}
.card-desc{font-size:0.78rem;color:var(--text-muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:14px;}
.card-footer{display:flex;gap:6px;flex-wrap:wrap;}
.ctag{font-size:0.68rem;font-weight:600;padding:3px 9px;border-radius:20px;}
.ctag-prohibicion{background:rgba(255,107,107,0.1);color:var(--accent-red);border:1px solid rgba(255,107,107,0.25);}
.ctag-obligacion{background:rgba(74,158,255,0.1);color:var(--accent-blue);border:1px solid rgba(74,158,255,0.25);}
.ctag-permiso{background:rgba(61,214,140,0.1);color:var(--accent-green);border:1px solid rgba(61,214,140,0.25);}
.ctag-referencia{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(200,168,90,0.25);}

/* EMPTY */
.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text-muted);font-size:0.9rem;display:none;}
.empty.visible{display:block;}
.empty-icon{font-size:2.5rem;margin-bottom:12px;}

/* OVERLAY */
.overlay{position:fixed;inset:0;z-index:300;background:rgba(5,8,13,0.85);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);max-width:680px;width:100%;max-height:88vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent;transform:translateY(20px) scale(0.97);transition:transform 0.35s cubic-bezier(0.22,1,0.36,1);}
.modal::-webkit-scrollbar{width:3px;}
.modal::-webkit-scrollbar-thumb{background:var(--surface3);}
.overlay.open .modal{transform:none;}

.modal-header{position:sticky;top:0;background:var(--surface);border-bottom:1px solid rgba(255,255,255,0.06);padding:20px 24px;display:flex;align-items:flex-start;gap:14px;z-index:10;}
.modal-accent-bar{width:4px;border-radius:2px;align-self:stretch;flex-shrink:0;background:var(--gold);}
.modal-header-content{flex:1;}
.modal-type{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--gold);margin-bottom:4px;}
.modal-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--text);line-height:1.2;}
.modal-subtitle{font-size:0.78rem;color:var(--text-muted);margin-top:4px;font-style:italic;}
.modal-close{background:var(--surface2);border:1px solid rgba(255,255,255,0.07);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);transition:all 0.2s;flex-shrink:0;font-size:16px;}
.modal-close:hover{border-color:var(--border);color:var(--gold);}

.modal-body{padding:24px;}
.m-section{margin-bottom:20px;}
.m-label{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;gap:8px;opacity:0.6;}
.m-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06);}
.m-text{font-size:0.85rem;color:var(--text-muted);line-height:1.7;}
.pill-row{display:flex;flex-wrap:wrap;gap:7px;}
.pill{background:var(--surface2);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:4px 12px;font-size:0.75rem;color:var(--text-muted);font-weight:500;}
.pill.blue{background:rgba(74,158,255,0.1);border-color:rgba(74,158,255,0.25);color:var(--accent-blue);}
.info-block{background:var(--surface2);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:12px 16px;font-size:0.84rem;line-height:1.65;color:var(--text-muted);}

/* SCROLL TOP */
#scrollTop{position:fixed;bottom:24px;right:24px;width:40px;height:40px;background:var(--gold);color:var(--ink);border:none;border-radius:50%;cursor:pointer;font-size:16px;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(200,168,90,0.4);z-index:200;transition:transform 0.2s;}
#scrollTop:hover{transform:scale(1.1);}
#scrollTop.visible{display:flex;}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:768px){
  .menu-toggle{display:flex;}
  .topbar-badge{display:none;}
  .sidebar{position:fixed;left:-240px;top:58px;z-index:150;transition:left 0.3s ease;box-shadow:4px 0 30px rgba(0,0,0,0.5);}
  .sidebar.open{left:0;}
  .main{padding:20px 16px;}
  .card-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo-badge">⚖️</div>
  <div class="topbar-text">
    <h1>Normativa Jurídica Colombiana</h1>
    <p>Marco legal · Administración Pública · Colombia</p>
  </div>
  <div class="topbar-right">
    <span class="topbar-badge">19 normas</span>
    <button class="menu-toggle" id="menuToggle">☰</button>
  </div>
</header>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-search">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Buscar norma…">
    </div>

    <span class="nav-group-label">Por tipo</span>
    <button class="filter-btn active" data-filter="all"><span class="filter-btn-inner"><span class="t-icon">📋</span><span class="t-label">Todas</span><span class="t-count">19</span></span></button>
    <button class="filter-btn" data-filter="constitucion"><span class="filter-btn-inner"><span class="t-icon">🏛️</span><span class="t-label">Constitución</span><span class="t-count">1</span></span></button>
    <button class="filter-btn" data-filter="ley"><span class="filter-btn-inner"><span class="t-icon">📜</span><span class="t-label">Leyes</span><span class="t-count">12</span></span></button>
    <button class="filter-btn" data-filter="decreto"><span class="filter-btn-inner"><span class="t-icon">📑</span><span class="t-label">Decretos</span><span class="t-count">6</span></span></button>
    <button class="filter-btn" data-filter="acuerdo"><span class="filter-btn-inner"><span class="t-icon">🗂️</span><span class="t-label">Acuerdos</span><span class="t-count">1</span></span></button>
    <button class="filter-btn" data-filter="referencia"><span class="filter-btn-inner"><span class="t-icon">🔗</span><span class="t-label">Referenciadas</span><span class="t-count">8</span></span></button>

    <span class="nav-group-label">Por materia</span>
    <button class="filter-btn" data-filter="mat-archivo"><span class="filter-btn-inner"><span class="t-icon">🗃️</span><span class="t-label">Archivos</span></span></button>
    <button class="filter-btn" data-filter="mat-peticion"><span class="filter-btn-inner"><span class="t-icon">✉️</span><span class="t-label">Derecho Petición</span></span></button>
    <button class="filter-btn" data-filter="mat-empleo"><span class="filter-btn-inner"><span class="t-icon">👥</span><span class="t-label">Empleo Público</span></span></button>
    <button class="filter-btn" data-filter="mat-contaduria"><span class="filter-btn-inner"><span class="t-icon">💰</span><span class="t-label">Contaduría</span></span></button>
  </aside>

  <main class="main">
    <div class="results-bar">
      <h2>Catálogo Normativo</h2>
      <span class="count-pill" id="countPill">19 resultados</span>
      <span id="countPill">  <a href="index.html" class="count-pill">Volver</a></span>
    
    </div>
    <div class="card-grid" id="grid">
      <div class="empty" id="empty"><div class="empty-icon">🔍</div>No se encontraron normas con ese criterio.</div>
    </div>
  </main>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-accent-bar" id="mBar"></div>
      <div class="modal-header-content">
        <p class="modal-type" id="mType"></p>
        <h2 class="modal-title" id="mTitle"></h2>
        <p class="modal-subtitle" id="mSub"></p>
      </div>
      <button class="modal-close" id="closeModal">✕</button>
    </div>
    <div class="modal-body">
      <div class="m-section"><p class="m-label">Resumen</p><div class="info-block" id="mResumen"></div></div>
      <div class="m-section"><p class="m-label">Dónde se aplica</p><div class="pill-row" id="mDonde"></div></div>
      <div class="m-section"><p class="m-label">Para qué sirve</p><p class="m-text" id="mSirve"></p></div>
      <div class="m-section"><p class="m-label">Cuándo se usa</p><p class="m-text" id="mCuando"></p></div>
    </div>
  </div>
</div>

<button id="scrollTop">↑</button>

<script>
const DATA = [
  {tipo:'constitucion',mat:['mat-peticion','mat-archivo','mat-empleo','mat-contaduria'],icon:'🏛️',badge:'Constitución',num:'Constitución Política',year:'1991',acento:'#C8A85A',titulo:'Constitución Política de Colombia',subtitulo:'Norma de normas — Carta Fundamental del Estado',resumen:'Es la norma suprema del ordenamiento jurídico colombiano. Establece la organización del Estado, los derechos y deberes fundamentales de los ciudadanos y los principios de la función pública. Todo el ordenamiento debe estar en concordancia con ella.',donde:['Todo el territorio nacional','Todas las personas','Entidades públicas y privadas'],sirve:'Sirve como marco jurídico supremo. Protege derechos fundamentales (derecho de petición Art. 23), define la estructura del Estado (Art. 113–120), establece los principios de la función administrativa (Art. 209) y crea organismos como la Contaduría General de la Nación (Art. 354).',cuando:'Se usa en cualquier acción legal, administrativa o judicial. Es la referencia para interponer tutelas, verificar constitucionalidad de normas y fundamentar actos administrativos.',tags:['permiso','obligacion']},

  {tipo:'ley',mat:['mat-archivo'],icon:'📜',badge:'Ley',num:'Ley 594',year:'2000',acento:'#C8A85A',titulo:'Ley General de Archivos',subtitulo:'Regula la función archivística del Estado colombiano',resumen:'Establece las reglas y principios generales de la función archivística del Estado. Define conceptos clave: archivo, gestión documental, tabla de retención documental y patrimonio documental. Crea el Sistema Nacional de Archivos liderado por el Archivo General de la Nación.',donde:['Toda la administración pública nacional, departamental y municipal','Entidades privadas que cumplen funciones públicas'],sirve:'Ordena la gestión documental desde la creación del documento hasta su disposición final (conservación o eliminación), garantizando transparencia, acceso a la información y preservación del patrimonio documental.',cuando:'Se usa al organizar archivos, elaborar Tablas de Retención Documental (TRD) y Programas de Gestión Documental (PGD), transferir documentos históricos, o cuando un ciudadano solicita acceso a documentos públicos.',tags:['obligacion','permiso']},

  {tipo:'ley',mat:['mat-peticion'],icon:'📜',badge:'Ley',num:'Ley 1437',year:'2011',acento:'#4A9EFF',titulo:'CPACA — Código de Procedimiento Administrativo',subtitulo:'Regula procedimientos administrativos y la jurisdicción contencioso-administrativa',resumen:'Regula los procedimientos administrativos en Colombia y la Jurisdicción de lo Contencioso Administrativo. Unifica las reglas para la actuación de las autoridades y los particulares frente al Estado.',donde:['Organismos de las ramas del poder público','Órganos autónomos e independientes','Particulares que cumplan funciones administrativas'],sirve:'Garantiza los derechos de las personas en sus relaciones con el Estado. Establece reglas para peticiones, notificaciones, recursos (reposición, apelación), silencio administrativo y medios de control judicial.',cuando:'Se usa en toda actuación administrativa: presentar peticiones, interponer recursos, notificar actos, y en procesos judiciales contencioso-administrativos para demandar a entidades públicas por actos ilegales.',tags:['obligacion','permiso']},

  {tipo:'ley',mat:['mat-peticion'],icon:'📜',badge:'Ley Estatutaria',num:'Ley 1755',year:'2015',acento:'#4A9EFF',titulo:'Ley Estatutaria del Derecho de Petición',subtitulo:'Sustituyó el Título II del CPACA',resumen:'Regula de manera específica el derecho fundamental de petición. Define sus modalidades, términos y procedimientos: 15 días hábiles (general), 10 días (documentos), 30 días (consultas), 5 días (traslado). El derecho es gratuito, puede ser verbal o escrito.',donde:['Autoridades públicas','Organizaciones privadas que garantizan derechos fundamentales','EPS, AFP, Cajas de Compensación'],sirve:'Garantiza que cualquier ciudadano pueda hacer solicitudes al Estado y obtener respuesta oportuna, clara y de fondo. Define el procedimiento para peticiones incompletas, irrespetuosas o con información reservada.',cuando:'Se usa cuando un ciudadano pide información, solicita copias de documentos, formula quejas o reclamos, o exige el reconocimiento de un derecho ante entidades públicas o privadas.',tags:['permiso','obligacion']},

  {tipo:'ley',mat:['mat-peticion'],icon:'📜',badge:'Ley',num:'Ley 734',year:'2002',acento:'#FF6B6B',titulo:'Código Disciplinario Único',subtitulo:'Régimen disciplinario de los servidores públicos',resumen:'Establecía los deberes, prohibiciones, faltas y sanciones disciplinarias para servidores públicos. Aunque fue derogada por la Ley 1952 de 2019, se cita como base para sanciones por no atender el derecho de petición.',donde:['Todos los servidores públicos del país'],sirve:'Define faltas disciplinarias y sanciones: amonestación escrita, multa, suspensión, destitución e inhabilidad general. Las faltas contra el patrimonio documental son gravísimas.',cuando:'Se cita cuando un funcionario no responde oportunamente el derecho de petición o destruye patrimonio documental. Actualmente aplica la Ley 1952 de 2019 (Código General Disciplinario).',tags:['prohibicion','obligacion']},

  {tipo:'ley',mat:['mat-peticion','mat-archivo'],icon:'📜',badge:'Ley Estatutaria',num:'Ley 1712',year:'2014',acento:'#3DD68C',titulo:'Ley de Transparencia y Acceso a la Información Pública',subtitulo:'Regula el acceso a la información pública y la transparencia activa',resumen:'Regula el derecho fundamental de acceso a la información pública. Establece los principios de máxima publicidad y transparencia, define la información pública y los procedimientos para acceder a ella.',donde:['Todos los sujetos obligados que generen, administren o posean información pública'],sirve:'Garantiza que los ciudadanos puedan conocer y acceder a la información del Estado, promoviendo el control social y la lucha contra la corrupción. Define transparencia activa y pasiva.',cuando:'Se usa para solicitar información a entidades públicas, publicar información de manera proactiva, y definir las restricciones de información clasificada o reservada.',tags:['permiso','obligacion']},

// ── RENDER ──
const grid    = document.getElementById('grid');
const empty   = document.getElementById('empty');
const countEl = document.getElementById('countPill');
const overlay = document.getElementById('overlay');

function tagHTML(tag) {
  const map = {
    prohibicion:['ctag-prohibicion','Prohibición'],
    obligacion: ['ctag-obligacion', 'Obligación'],
    permiso:    ['ctag-permiso',    'Permiso'],
    referencia: ['ctag-referencia', 'Referencia'],
  };
  const [cls, label] = map[tag] || ['ctag-referencia', tag];
  return `<span class="ctag ${cls}">${label}</span>`;
}

function render(list) {
  document.querySelectorAll('.card').forEach(c => c.remove());
  empty.classList.remove('visible');
  countEl.textContent = `${list.length} resultado${list.length!==1?'s':''}`;
  if (!list.length) { empty.classList.add('visible'); return; }
  list.forEach((n, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.style.animationDelay = `${i*0.035}s`;
    el.style.setProperty('--card-accent', n.acento);
    el.innerHTML = `
      <div class="card-top"><div class="card-icon">${n.icon}</div><span class="card-type-badge">${n.badge}</span></div>
      <div class="card-num">${n.num}</div>
      <div class="card-year">— ${n.year} —</div>
      <div class="card-title">${n.titulo}</div>
      <div class="card-desc">${n.resumen}</div>
      <div class="card-footer">${n.tags.map(tagHTML).join('')}</div>`;
    el.addEventListener('click', () => openModal(n));
    grid.insertBefore(el, empty);
  });
}

function openModal(n) {
  document.getElementById('mBar').style.background   = n.acento;
  document.getElementById('mType').textContent       = n.badge;
  document.getElementById('mTitle').textContent      = `${n.num} de ${n.year}`;
  document.getElementById('mSub').textContent        = n.subtitulo;
  document.getElementById('mResumen').textContent    = n.resumen;
  document.getElementById('mSirve').textContent      = n.sirve;
  document.getElementById('mCuando').textContent     = n.cuando;
  document.getElementById('mDonde').innerHTML        = n.donde.map(d=>`<span class="pill blue">${d}</span>`).join('');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() { overlay.classList.remove('open'); document.body.style.overflow=''; }
document.getElementById('closeModal').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

let activeFilter = 'all', searchTerm = '';
function applyFilters() {
  const q = searchTerm.toLowerCase();
  const filtered = DATA.filter(n => {
    const mf = activeFilter==='all' || n.tipo===activeFilter || (n.mat&&n.mat.includes(activeFilter));
    const ms = !q || n.num.toLowerCase().includes(q) || n.titulo.toLowerCase().includes(q) || n.resumen.toLowerCase().includes(q) || n.year.includes(q);
    return mf && ms;
  });
  render(filtered);
}
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilters();
  });
});
document.getElementById('search').addEventListener('input', e => { searchTerm=e.target.value; applyFilters(); });
document.getElementById('menuToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
const scrollBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => scrollBtn.classList.toggle('visible', window.scrollY>300));
scrollBtn.addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));

render(DATA);
</script>
